<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Col — personal climb catalog</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=Fraunces:ital,opsz,wght@0,9..144,400;1,9..144,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root {
    --paper: #F3ECD9; --paper-2: #EADFBE; --ink: #0E1424; --ink-soft: #2A2F3E;
    --mustard: #D9A326; --vermilion: #E54B2A; --teal: #2C6B7E;
    --rule: rgba(14,20,36,.18);
  }
  *,*::before,*::after { box-sizing: border-box; }
  body { margin:0; background:var(--paper); color:var(--ink); font-family:"Fraunces",Georgia,serif; font-size:16px; line-height:1.5; }
  body::before { content:""; position:fixed; inset:0; pointer-events:none; z-index:50; opacity:.22; mix-blend-mode:multiply;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.055 0 0 0 0 0.078 0 0 0 0 0.141 0 0 0 0.5 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>"); }
  a { color:var(--ink); }
  .mono { font-family:"Space Mono",monospace; }
  .display { font-family:"Bricolage Grotesque",sans-serif; }

  .shell { max-width:1200px; margin:0 auto; padding:24px 24px 80px; position:relative; z-index:1; }

  /* ── header ── */
  .hdr { display:flex; align-items:baseline; justify-content:space-between; gap:16px; flex-wrap:wrap; border-bottom:1px solid var(--rule); padding-bottom:14px; margin-bottom:28px; }
  .hdr h1 { font-family:"Bricolage Grotesque",sans-serif; font-weight:800; font-size:clamp(32px,5vw,52px); letter-spacing:-0.03em; margin:0; }
  .hdr h1 em { font-family:"Fraunces",serif; font-style:italic; font-weight:400; color:var(--teal); }
  .hdr .sub { font-family:"Space Mono",monospace; font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:var(--ink-soft); }

  /* ── stats bar ── */
  .stats { display:flex; flex-wrap:wrap; gap:12px; margin-bottom:24px; }
  .stat { background:var(--paper-2); border:1px solid var(--ink); padding:12px 16px; flex:1 1 140px; min-width:140px; }
  .stat .val { font-family:"Bricolage Grotesque",sans-serif; font-weight:700; font-size:28px; letter-spacing:-0.02em; }
  .stat .lbl { font-family:"Space Mono",monospace; font-size:10px; letter-spacing:.14em; text-transform:uppercase; color:var(--ink-soft); margin-top:2px; }

  /* ── layout ── */
  .content { display:grid; grid-template-columns:1fr 1fr; gap:20px; }
  @media(max-width:800px) { .content { grid-template-columns:1fr; } }

  /* ── map ── */
  #map { height:480px; border:1px solid var(--ink); background:var(--paper-2); }
  .leaflet-popup-content-wrapper { border-radius:0; border:1px solid var(--ink); }

  /* ── climb list ── */
  .panel { border:1px solid var(--ink); background:var(--paper-2); max-height:480px; overflow-y:auto; }
  .panel-head { position:sticky; top:0; background:var(--mustard); border-bottom:1px solid var(--ink); padding:10px 14px;
    font-family:"Space Mono",monospace; font-size:11px; letter-spacing:.12em; text-transform:uppercase; display:flex; justify-content:space-between; align-items:center; }
  .climb-row { display:grid; grid-template-columns:1fr auto auto; gap:8px; padding:10px 14px; border-bottom:1px solid var(--rule); cursor:pointer; transition:background .15s; align-items:baseline; }
  .climb-row:hover { background:rgba(217,163,38,.15); }
  .climb-row .name { font-family:"Bricolage Grotesque",sans-serif; font-weight:700; font-size:15px; }
  .climb-row .info { font-family:"Space Mono",monospace; font-size:11px; color:var(--ink-soft); white-space:nowrap; }
  .climb-row .badge { font-family:"Space Mono",monospace; font-size:11px; background:var(--ink); color:var(--paper); padding:2px 6px; }
  .empty { padding:40px 20px; text-align:center; color:var(--ink-soft); }

  /* ── upload ── */
  .upload { margin-top:24px; border:2px dashed var(--rule); padding:28px; text-align:center; transition:border-color .2s; }
  .upload.drag { border-color:var(--vermilion); }
  .upload h3 { font-family:"Bricolage Grotesque",sans-serif; font-size:20px; margin:0 0 8px; }
  .upload p { color:var(--ink-soft); margin:0 0 14px; font-size:14px; }
  .upload input[type=file] { display:none; }
  .btn { display:inline-block; font-family:"Space Mono",monospace; font-size:12px; letter-spacing:.08em; text-transform:uppercase;
    padding:10px 20px; border:1px solid var(--ink); background:var(--mustard); color:var(--ink); cursor:pointer; transition:transform .15s,box-shadow .15s; }
  .btn:hover { transform:translate(-2px,-2px); box-shadow:4px 4px 0 var(--ink); }
  .btn.danger { background:var(--vermilion); color:var(--paper); border-color:var(--vermilion); }
  .upload-status { margin-top:12px; font-family:"Space Mono",monospace; font-size:12px; color:var(--teal); }

  /* ── sort controls ── */
  .sort-bar { display:flex; gap:6px; }
  .sort-btn { font-family:"Space Mono",monospace; font-size:10px; letter-spacing:.08em; text-transform:uppercase;
    padding:3px 8px; border:1px solid var(--ink); background:var(--paper); cursor:pointer; color:var(--ink); }
  .sort-btn.active { background:var(--ink); color:var(--paper); }
</style>
</head>
<body>
<div class="shell">

  <header class="hdr">
    <h1>C<em>o</em>l</h1>
    <span class="sub">personal climb catalog — col.extragornax.fr</span>
  </header>

  <div class="stats" id="stats">
    <div class="stat"><div class="val" id="s-climbs">—</div><div class="lbl">unique climbs</div></div>
    <div class="stat"><div class="val" id="s-attempts">—</div><div class="lbl">total attempts</div></div>
    <div class="stat"><div class="val" id="s-gain">—</div><div class="lbl">total D+ (m)</div></div>
    <div class="stat"><div class="val" id="s-highest">—</div><div class="lbl">highest (m)</div></div>
    <div class="stat"><div class="val" id="s-steepest">—</div><div class="lbl">steepest (%)</div></div>
  </div>

  <div class="content">
    <div id="map"></div>
    <div class="panel" id="panel">
      <div class="panel-head">
        <span>Climbs</span>
        <div class="sort-bar">
          <button class="sort-btn active" data-sort="gain">D+</button>
          <button class="sort-btn" data-sort="gradient">%</button>
          <button class="sort-btn" data-sort="times">×</button>
          <button class="sort-btn" data-sort="name">A-Z</button>
        </div>
      </div>
      <div id="climb-list"><div class="empty">Upload GPX files to populate your climb catalog.</div></div>
    </div>
  </div>

  <div class="upload" id="drop-zone">
    <h3>Add rides</h3>
    <p>Drop GPX files here, or click to pick. Each file is scanned for climbs (≥ 50 m gain).</p>
    <label class="btn">
      Choose GPX files
      <input type="file" id="file-input" accept=".gpx" multiple>
    </label>
    <div class="upload-status" id="upload-status"></div>
  </div>

</div>

<script>
const map = L.map('map').setView([46.8, 2.3], 6);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap',
  maxZoom: 18,
}).addTo(map);

const markers = L.layerGroup().addTo(map);
let climbs = [];
let currentSort = 'gain';

function fmt(n, d=0) { return n == null ? '—' : Number(n).toFixed(d); }
function climbLabel(c) { return c.name || `Climb #${c.id} (${fmt(c.end_ele,0)} m)`; }

function gradientColor(g) {
  if (g >= 10) return '#E54B2A';
  if (g >= 7) return '#D9A326';
  if (g >= 5) return '#2C6B7E';
  return '#0E1424';
}

function renderClimbs() {
  markers.clearLayers();
  const list = document.getElementById('climb-list');

  if (!climbs.length) {
    list.innerHTML = '<div class="empty">Upload GPX files to populate your climb catalog.</div>';
    return;
  }

  const sorted = [...climbs];
  if (currentSort === 'gain') sorted.sort((a,b) => b.gain - a.gain);
  else if (currentSort === 'gradient') sorted.sort((a,b) => b.gradient - a.gradient);
  else if (currentSort === 'times') sorted.sort((a,b) => b.times_ridden - a.times_ridden);
  else if (currentSort === 'name') sorted.sort((a,b) => climbLabel(a).localeCompare(climbLabel(b)));

  list.innerHTML = sorted.map(c => `
    <div class="climb-row" data-id="${c.id}" data-lat="${c.lat}" data-lon="${c.lon}">
      <span class="name">${climbLabel(c)}</span>
      <span class="info">${fmt(c.gain,0)} m · ${fmt(c.gradient,1)}% · ${fmt(c.distance_km,1)} km</span>
      <span class="badge">${c.times_ridden}×</span>
    </div>
  `).join('');

  const bounds = [];
  sorted.forEach(c => {
    const color = gradientColor(c.gradient);
    const m = L.circleMarker([c.lat, c.lon], {
      radius: Math.min(4 + c.times_ridden * 2, 14),
      color, fillColor: color, fillOpacity: 0.7, weight: 1,
    }).addTo(markers);
    m.bindPopup(`<b>${climbLabel(c)}</b><br>${fmt(c.gain,0)} m D+ · ${fmt(c.gradient,1)}% · ${fmt(c.distance_km,1)} km<br>${c.times_ridden} attempt${c.times_ridden>1?'s':''}`);
    bounds.push([c.lat, c.lon]);
  });

  if (bounds.length) map.fitBounds(bounds, { padding: [30, 30], maxZoom: 12 });
}

function renderStats(s) {
  document.getElementById('s-climbs').textContent = s.total_climbs;
  document.getElementById('s-attempts').textContent = s.total_attempts;
  document.getElementById('s-gain').textContent = fmt(s.total_gain_m, 0);
  document.getElementById('s-highest').textContent = fmt(s.highest_climb_m, 0);
  document.getElementById('s-steepest').textContent = fmt(s.steepest_gradient, 1);
}

async function loadData() {
  const [climbRes, statsRes] = await Promise.all([
    fetch('/api/climbs'), fetch('/api/stats')
  ]);
  if (climbRes.ok) { climbs = await climbRes.json(); renderClimbs(); }
  if (statsRes.ok) renderStats(await statsRes.json());
}

// Sort buttons
document.querySelectorAll('.sort-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentSort = btn.dataset.sort;
    renderClimbs();
  });
});

// Click climb row → fly to marker
document.getElementById('climb-list').addEventListener('click', e => {
  const row = e.target.closest('.climb-row');
  if (!row) return;
  map.flyTo([+row.dataset.lat, +row.dataset.lon], 13, { duration: 0.8 });
});

// Upload
const dropZone = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');
const status = document.getElementById('upload-status');

['dragenter','dragover'].forEach(ev => dropZone.addEventListener(ev, e => { e.preventDefault(); dropZone.classList.add('drag'); }));
['dragleave','drop'].forEach(ev => dropZone.addEventListener(ev, () => dropZone.classList.remove('drag')));

dropZone.addEventListener('drop', e => { e.preventDefault(); handleFiles(e.dataTransfer.files); });
fileInput.addEventListener('change', () => handleFiles(fileInput.files));

async function handleFiles(files) {
  if (!files.length) return;
  status.textContent = `Uploading ${files.length} file${files.length>1?'s':''}…`;

  const form = new FormData();
  for (const f of files) form.append('file', f);

  const res = await fetch('/api/upload/gpx', { method: 'POST', body: form });
  if (res.ok) {
    const data = await res.json();
    status.textContent = `Done — ${data.climbs_processed} climb${data.climbs_processed!==1?'s':''} processed.`;
    loadData();
  } else {
    status.textContent = `Error: ${await res.text()}`;
  }
  fileInput.value = '';
}

loadData();
</script>
</body>
</html>
