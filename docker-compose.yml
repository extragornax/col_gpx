services:
  col:
    build: .
    image: col_gpx:latest
    container_name: col_gpx
    ports:
      - "9017:3000"
    environment:
      PORT: "3000"
      DB_PATH: "/data/col.db"
      RUST_LOG: "info,col_gpx=debug"
      BASE_URL: "https://col.extragornax.fr"
      STRAVA_CLIENT_ID: "${STRAVA_CLIENT_ID}"
      STRAVA_CLIENT_SECRET: "${STRAVA_CLIENT_SECRET}"
    volumes:
      - col_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

volumes:
  col_data:
